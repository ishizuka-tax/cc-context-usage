name: CI

# Public-edition self-verification (this package is NOT continuously dogfooded by the
# maintainer; CI is the primary correctness gate). See README "Verification posture".

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: pytest (core + adapters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e . pytest
      - run: pytest -v

  shell:
    name: shellcheck + installer test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: for f in scripts/*.sh tests/*.sh; do echo "bash -n $f"; bash -n "$f"; done
      - run: shellcheck --severity=warning scripts/*.sh tests/*.sh
      - run: bash tests/test-install-cli.sh
      - run: bash tests/test-uninstall-cli.sh
